name: Feature request
description: Suggest new functionality or a design improvement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the improvement you have in mind.
        Check open issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the context or pain point this feature addresses.
      placeholder: "Attendees have asked for a printable one-page version of the schedule."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: "Add a 'Print schedule' button on the Program page that applies print-friendly CSS."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Needed before the symposium
    validations:
      required: false
