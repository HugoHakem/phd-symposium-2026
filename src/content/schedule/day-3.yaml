day: 3
date: "2026-11-07"
title: "Technology Frontiers"
theme: "Spatial Biology, Proteomics & The Future of Discovery"
color: "#2D6A4F"
sessions:
  - time: "09:00"
    title: "Keynote Lecture: Spatially-resolved multi-omics — charting tissue architecture at scale"
    type: "keynote"
    speaker: "Prof. Oliver Schmidt"
    speakerSlug: "oliver-schmidt"
    abstract: "We present the first spatially-resolved multi-omic atlas of the human heart at single-cell resolution, combining spatial transcriptomics, proteomics, and chromatin accessibility measurements to reveal how tissue architecture governs cardiac cell states."
    location: "EMBL ATC Auditorium"
  - time: "10:00"
    title: "Coffee Break"
    type: "break"
    location: "ATC Foyer"
  - time: "10:30"
    title: "Spatial transcriptomics of the developing human brain: from organoids to organ"
    type: "talk"
    speaker: "Dr. Amara Diallo"
    speakerSlug: "amara-diallo"
    abstract: "We present a spatially-resolved single-cell atlas of human fetal brain development from 9 to 25 weeks of gestation, combined with CRISPR screens in cerebral organoids to identify drivers of neurodevelopmental disorders."
    location: "EMBL ATC Auditorium"
  - time: "11:15"
    title: "Deep proteomics: quantifying the entire human proteome from single cells"
    type: "talk"
    speaker: "Dr. Sarah Lindberg"
    speakerSlug: "sarah-lindberg"
    abstract: "We describe nanoscale proteomics workflows that quantify over 5,000 proteins from single cells without amplification, revealing previously invisible layers of post-transcriptional regulation and protein-level cell heterogeneity."
    location: "EMBL ATC Auditorium"
  - time: "12:00"
    title: "Lunch Break"
    type: "lunch"
    location: "EMBL Canteen"
  - time: "13:30"
    title: "Workshop: Spatial Data Visualization — Squidpy, Napari, and Beyond"
    type: "workshop"
    speaker: "EMBL Bioinformatics Core"
    abstract: "Hands-on workshop covering tools for analyzing and visualizing spatial transcriptomics data, including cell segmentation, neighborhood analysis, and interactive exploration with Napari."
    location: "EMBL Computer Lab, Room 002"
  - time: "15:00"
    title: "Coffee Break"
    type: "break"
    location: "ATC Foyer"
  - time: "15:30"
    title: "Closing Symposium: The Next Decade of Discovery — Where Do We Go From Here?"
    type: "panel"
    speaker: "All Keynote Speakers & Symposium Committee"
    abstract: "An open discussion with the symposium's keynote speakers on future directions, grand challenges, and the scientific opportunities that arise when we truly embrace scale in biology."
    location: "EMBL ATC Auditorium"
  - time: "16:30"
    title: "Awards Ceremony — Best Poster, Best Flash Talk, Symposium Committee Handover"
    type: "ceremony"
    location: "EMBL ATC Auditorium"
  - time: "17:00"
    title: "Farewell Reception"
    type: "social"
    location: "EMBL Restaurant Terrace"
