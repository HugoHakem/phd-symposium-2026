day: 2
date: "2026-11-06"
title: "Circuits & Systems"
theme: "Computational Biology, AI & Systems Medicine"
color: "#C1121F"
sessions:
  - time: "09:00"
    title: "Keynote Lecture: Network medicine — rewiring disease maps at population scale"
    type: "keynote"
    speaker: "Prof. Elena Vasquez"
    speakerSlug: "elena-vasquez"
    abstract: "Using multi-omic data from biobanks of millions of individuals, we construct dynamic, patient-specific molecular networks that predict disease trajectories and drug responses with unprecedented accuracy."
    location: "EMBL ATC Auditorium"
  - time: "10:00"
    title: "Coffee Break"
    type: "break"
    location: "ATC Foyer"
  - time: "10:30"
    title: "Graph neural networks for protein interaction prediction at proteome scale"
    type: "talk"
    speaker: "Dr. Marcus Brenner"
    speakerSlug: "marcus-brenner"
    abstract: "We introduce ProteomeGNN, a graph neural network trained on structural and co-evolutionary features that predicts the complete protein–protein interaction network of model organisms from sequence alone."
    location: "EMBL ATC Auditorium"
  - time: "11:15"
    title: "Foundation models for oncology: training on the cancer transcriptome"
    type: "talk"
    speaker: "Dr. Priya Sharma"
    speakerSlug: "priya-sharma"
    abstract: "OncoGPT-2, our cancer foundation model pre-trained on 500,000 single-cell profiles from patient biopsies, achieves state-of-the-art drug sensitivity prediction and identifies novel therapeutic vulnerabilities."
    location: "EMBL ATC Auditorium"
  - time: "12:00"
    title: "Lunch & EMBL Campus Tour (Optional)"
    type: "lunch"
    location: "EMBL Canteen / Campus"
  - time: "13:30"
    title: "Workshop: Machine Learning for Omics Data — From scRNA-seq to Foundation Models"
    type: "workshop"
    speaker: "EMBL-EBI Bioinformatics Training Team"
    abstract: "Practical introduction to using scVI, Geneformer, and custom transformer architectures for single-cell data analysis. Participants will train and evaluate models on provided datasets."
    location: "EMBL Computer Lab, Room 002"
  - time: "15:00"
    title: "Coffee Break"
    type: "break"
    location: "ATC Foyer"
  - time: "15:30"
    title: "Career Panel: Navigating the Interface of Biology and Data Science"
    type: "panel"
    speaker: "Alumni from Academia, Biotech, and Industry"
    abstract: "PhD alumni working at the interface of biology and computation share their career paths, discuss industry versus academia trade-offs, and answer questions about transitioning between fields."
    location: "EMBL ATC Auditorium"
  - time: "16:30"
    title: "Poster Session II — Computational & Systems Biology"
    type: "poster"
    location: "EMBL ATC Foyer & Corridors"
  - time: "19:30"
    title: "Symposium Gala Dinner"
    type: "social"
    location: "Heidelberg Old Town — Kulturhaus Karlstorbahnhof"
