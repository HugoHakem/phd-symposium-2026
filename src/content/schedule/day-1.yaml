day: 1
date: "2026-11-05"
title: "Molecules to Systems"
theme: "Structural Biology & Single-Cell Genomics at Scale"
color: "#1A5C36"
sessions:
  - time: "08:30"
    title: "Registration & Welcome Coffee"
    type: "break"
    location: "EMBL Main Building, Foyer"
  - time: "09:15"
    title: "Opening Ceremony & Welcome Address"
    type: "ceremony"
    speaker: "EMBL Director General & Symposium Committee"
    location: "EMBL ATC Auditorium"
  - time: "09:45"
    title: "Keynote Lecture: Cryo-electron tomography of the nuclear pore complex at atomic resolution"
    type: "keynote"
    speaker: "Dr. Anika Müller"
    speakerSlug: "anika-muller"
    abstract: "We present a revolutionary cryo-ET pipeline that resolves the human nuclear pore complex at sub-4Å resolution directly within intact nuclei, revealing unexpected conformational states and novel transport mechanisms."
    location: "EMBL ATC Auditorium"
  - time: "10:45"
    title: "Coffee Break & Poster Viewing"
    type: "break"
    location: "ATC Foyer"
  - time: "11:15"
    title: "Building a universal cell atlas: integrating millions of single-cell profiles"
    type: "talk"
    speaker: "Dr. Li Wei"
    speakerSlug: "li-wei"
    abstract: "We present scalable computational methods for cross-dataset integration of single-cell RNA-seq data, enabling the construction of a universal human cell type reference spanning tissues, diseases, and developmental stages."
    location: "EMBL ATC Auditorium"
  - time: "12:00"
    title: "Genome-scale functional screens: from CRISPR to causal mechanisms"
    type: "talk"
    speaker: "Prof. James Okafor"
    speakerSlug: "james-okafor"
    abstract: "We describe Perturb-seq at scale: simultaneous profiling of transcriptomic responses to 20,000 genetic perturbations in primary human hematopoietic cells, revealing regulatory networks controlling cell identity."
    location: "EMBL ATC Auditorium"
  - time: "12:45"
    title: "Lunch Break"
    type: "lunch"
    location: "EMBL Canteen"
  - time: "14:15"
    title: "Workshop: Introduction to Cryo-ET Data Analysis with RELION-5"
    type: "workshop"
    speaker: "EMBL Structural Biology Facility"
    abstract: "Hands-on tutorial covering particle picking, subtomogram averaging workflows, and resolution estimation using the latest RELION-5 software suite."
    location: "EMBL Computer Lab, Room 002"
  - time: "15:45"
    title: "Coffee Break"
    type: "break"
    location: "ATC Foyer"
  - time: "16:15"
    title: "Panel: Publishing in the Age of Big Data — Challenges, Preprints, and Reproducibility"
    type: "panel"
    speaker: "Editors from Nature Methods, eLife, and PLOS Biology"
    location: "EMBL ATC Auditorium"
  - time: "17:15"
    title: "Poster Session I — Structural & Cell Biology"
